services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ROOT=/music
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:4173","http://192.168.1.150:5173","http://192.168.1.150:4173"]
      - MUSICBRAINZ_USER_AGENT=MP3TagEditor/1.0 (admin@example.com)
    volumes:
      - ${MUSIC_DIR:-/tmp/music}:/music
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
